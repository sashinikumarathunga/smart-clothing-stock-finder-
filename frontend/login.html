<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login — Smart Stock Finder</title>

  <!-- Browser tab logo -->
  <link
    rel="icon"
    type="image/png"
    href="assets/images/logo.png"
  >

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  >

  <!-- Project CSS -->
  <link
    href="assets/css/style.css"
    rel="stylesheet"
  >
</head>

<body>

  <div class="login-wrapper">

    <!-- Back button -->
    <a class="login-back" href="index.html">
      <i class="bi bi-arrow-left"></i>
      Back to home
    </a>

    <!-- Login card -->
    <div class="card login-card">

      <div class="card-body p-4 p-md-5">

        <!-- Logo and project name -->
        <div class="login-brand mb-2">

          <img
            src="assets/images/logo.png?v=5"
            alt="Smart Stock Finder Logo"
            class="login-logo"
          >

          <span>Smart Stock Finder</span>

        </div>

        <p class="text-muted mb-4">
          Sign in to your retail workspace
        </p>

        <!-- Error messages appear here -->
        <div id="login-error"></div>

        <!-- Login form -->
        <form id="login-form">

          <!-- Username -->
          <div class="mb-3">

            <label class="form-label" for="username">
              Username
            </label>

            <div class="input-group">

              <span class="input-group-text bg-white">
                <i class="bi bi-person"></i>
              </span>

              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Enter your username"
                required
                autofocus
                autocomplete="username"
              >

            </div>

          </div>

          <!-- Password -->
          <div class="mb-4">

            <label class="form-label" for="password">
              Password
            </label>

            <div class="input-group">

              <span class="input-group-text bg-white">
                <i class="bi bi-lock"></i>
              </span>

              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              >

              <!-- Show/hide password button -->
              <button
                class="btn btn-outline-secondary"
                type="button"
                id="toggle-password"
                aria-label="Show or hide password"
              >
                <i class="bi bi-eye" id="password-eye"></i>
              </button>

            </div>

          </div>

          <!-- Login button -->
          <button
            type="submit"
            class="btn btn-primary w-100 py-2"
            id="login-btn"
          >

            <span id="login-btn-text">
              <i class="bi bi-box-arrow-in-right me-1"></i>
              Login
            </span>

            <span
              id="login-btn-spin"
              class="spinner-border spinner-border-sm d-none"
              role="status"
              aria-hidden="true"
            ></span>

          </button>

        </form>

        
      </div>

    </div>

  </div>

  <!-- JavaScript files -->
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>

  <script>
    // Redirect logged-in users
    if (getCurrentUser()) {
      window.location.href = 'pages/dashboard.html';
    }

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const btnText = document.getElementById('login-btn-text');
    const btnSpin = document.getElementById('login-btn-spin');

    const passwordInput = document.getElementById('password');
    const togglePasswordButton = document.getElementById('toggle-password');
    const passwordEye = document.getElementById('password-eye');

    // Show or hide password
    togglePasswordButton.addEventListener('click', () => {
      const isPasswordHidden = passwordInput.type === 'password';

      passwordInput.type = isPasswordHidden ? 'text' : 'password';

      passwordEye.className = isPasswordHidden
        ? 'bi bi-eye-slash'
        : 'bi bi-eye';
    });

    // Login form submission
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const errorEl = document.getElementById('login-error');

      errorEl.innerHTML = '';

      btn.disabled = true;
      btnText.classList.add('d-none');
      btnSpin.classList.remove('d-none');

      try {
        await login(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        );

        window.location.href = 'pages/dashboard.html';

      } catch (error) {
        const rawMessage = String(error?.message || '').toLowerCase();
        let message = 'Unable to log in. Please try again.';

        if (
          rawMessage.includes('invalid') ||
          rawMessage.includes('unauthorized') ||
          rawMessage.includes('incorrect') ||
          rawMessage.includes('wrong username') ||
          rawMessage.includes('401')
        ) {
          message = 'Wrong username or password. Please check your details and try again.';
        } else if (
          rawMessage.includes('failed to fetch') ||
          rawMessage.includes('network')
        ) {
          message = 'Cannot connect to the server. Make sure Apache and MySQL are running.';
        }

        errorEl.innerHTML = `
          <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-octagon-fill"></i>
            <span>${escapeHtml(message)}</span>
          </div>
        `;

        btn.disabled = false;
        btnText.classList.remove('d-none');
        btnSpin.classList.add('d-none');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });
  </script>

</body>
</html>
