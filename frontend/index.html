<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart Stock Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-body p-4 p-md-5">
        <div class="login-brand mb-1"><i class="bi bi-bag-check-fill"></i><span>Smart Stock Finder</span></div>
        <p class="text-muted mb-4">Sign in to your retail workspace</p>
        <div id="login-error"></div>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
              <input class="form-control" id="username" name="username" required autofocus autocomplete="username">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
            <span id="login-btn-text"><i class="bi bi-box-arrow-in-right me-1"></i>Login</span>
            <span id="login-btn-spin" class="spinner-border spinner-border-sm d-none"></span>
          </button>
        </form>
        <div class="login-hint mt-4">
          <i class="bi bi-info-circle me-1"></i> Demo accounts use password <code>password123</code> — e.g. <code>owner</code>, <code>store_colombo</code>, <code>cashier_colombo</code>.
        </div>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    if (getCurrentUser()) {
      window.location.href = 'pages/dashboard.html';
    }

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const btnText = document.getElementById('login-btn-text');
    const btnSpin = document.getElementById('login-btn-spin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('login-error');
      errorEl.innerHTML = '';
      btn.disabled = true;
      btnText.classList.add('d-none');
      btnSpin.classList.remove('d-none');

      try {
        await login(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        );
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        errorEl.innerHTML = `<div class="alert alert-danger d-flex align-items-center gap-2"><i class="bi bi-exclamation-octagon-fill"></i><span>${escapeHtml(err.message)}</span></div>`;
        btn.disabled = false;
        btnText.classList.remove('d-none');
        btnSpin.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
